<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>     <!--this appear in tab bar-->
</head>
<body>
  <h1>welcome to html course </h1>  <!--heading tag--> <!--HTML headings are defined with the <h1> to <h6> tags.

  <h1> defines the most important heading. <h6> defines the least important heading.-->
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Odit, laborum.</p> <!--paragraph tag-->
    <hr> <!--horizontal tag used to draw a line-->
    <br> <!--break tag to add space-->
    <!--ordered list left side numbers will come to grt multiple list just do (list*5) then press enter-->
    <ol>
      <li>apple</li>
      <li>banana</li>
      <li>orange</li>
    </ol>
    <!--unordered list dots will come on left side-->
    <ul>
      <li>apple</li>
      <li>banana</li>
    </ul>
    <!--anchor tag-->
    <!--The <a> tag defines a hyperlink, which is used to link from one page to another.-->
      <!--The most important attribute of the <a> element is the href attribute, which indicates the link's destination.-->
        <!--A linked page is normally displayed in the current browser window, unless you specify another target.-->
    <a href="https://www.w3schools.com">visit w3school.com</a> 
    <!--with target specified-->
    <!--target attribute specifies where to open the linked document-->
    <!--_self (default) Opens the link in the same tab-->
    <!--_blank Opens the link in a new tab-->
  <a href="https://www.w3schools.com" target="_top">visit w3school.com</a>
  






</body>
</html>
